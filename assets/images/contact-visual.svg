<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" role="img" aria-labelledby="title desc">
  <title id="title">PraaS Inquiry Routing</title>
  <desc id="desc">Brand-specific enterprise technology visual for PraaS showing the service workflow and supporting diagram.</desc>
  <defs>
